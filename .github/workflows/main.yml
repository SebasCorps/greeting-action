name: Custum Action Demo
on:
  push:
    branches:
      - main

jobs:
  greet-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Calling custom action yml
        id: greet
        uses: ./
        with:
          username: sebasxdd
      - name: Using Action outputs
        run: echo "Action says - ${{ steps.greet.outputs.message }}"
